
<div class="card h-100">
    <img [src]="product.thumbnail" class="card-img-top" [alt]="product.title" style="height: 230px; object-fit: cover;">
    <div class="card-body d-flex flex-column">
      <h5 class="card-title">{{ product.title }}</h5>
      
      <p class="card-text">
        
        <small class="text-muted mb-2">Brand: {{ product.brand }}</small>
      </p>
      <h6 class="card-subtitle mb-2  text-muted">
        ${{ product.price }}
        <span *ngIf="product.discountPercentage > 0" class="badge bg-success ">{{ product.discountPercentage }}% OFF</span>
      </h6>
      <div class="mt-auto d-flex justify-content-between align-items-center">
        
        
        <div class="rating ">
          <span class="badge bg-warning text-dark">{{ product.rating }} ★</span>
        </div>
        <p class="text-muted mb-0">In Stock: {{ product.stock }}</p>

        
      </div>
      
      
    </div>
  </div>

<div class="container mt-5">
    <h2 class="text-center">Inscription</h2>
  
    <form (ngSubmit)="onSubmit()">

      <div class="form-group mb-3">
        <label for="name">Nom</label>
        <input 
          type="text" 
          id="name" 
          class="form-control" 
          [(ngModel)]="user.name" 
          name="name" 
          placeholder="Entrez votre nom" 
          required>
      </div>

      <div class="form-group mb-3">
        <label for="email">Adresse e-mail</label>
        <input 
          type="email" 
          id="email" 
          class="form-control" 
          [(ngModel)]="user.email" 
          name="email" 
          placeholder="Entrez votre e-mail" 
          required>
      </div>
  
      <div class="form-group mb-3">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          class="form-control" 
          [(ngModel)]="user.password" 
          name="password" 
          placeholder="Entrez votre mot de passe" 
          required>
      </div>
     
      <button type="submit" class="btn btn-primary btn-block">S'inscrire</button>
      <div *ngIf="!isSubscribed && !isFirst" class="submit-message typeMsgS"  >Inscription reussit</div>
      <div *ngIf=" isSubscribed && !isFirst" class="error-message"  >inscription echouee mail est deja utilisee</div>
      
    </form>
  </div>
